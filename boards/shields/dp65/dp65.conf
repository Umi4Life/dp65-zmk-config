# BLE and USB
CONFIG_ZMK_USB=y
# Disable deep sleep while debugging display power rail
# CONFIG_ZMK_SLEEP=y

# Battery reporting (nice!nano vbatt divider is board-defined)
CONFIG_ZMK_BATTERY_REPORTING=y
# Enable when right half is built:
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# nice!view display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n
# Keep idle longer while debugging the display
CONFIG_ZMK_IDLE_TIMEOUT=30000

# AS5600 magnetic scroll wheel (community driver via west.yml)
# Uses I2C1 — I2C0 conflicts with SPI0 on nRF52840
# Disabled while debugging nice!view — re-enable after display works
# CONFIG_ZMK_INPUT_AMS_AS5600=y
# Uncomment while tuning magnet gap:
# CONFIG_ZMK_INPUT_AMS_AS5600_LOG_AGC=y
