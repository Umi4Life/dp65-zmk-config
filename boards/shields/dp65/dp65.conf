# BLE and USB
CONFIG_ZMK_USB=y
CONFIG_ZMK_SLEEP=y

# Battery reporting (nice!nano vbatt divider is board-defined)
CONFIG_ZMK_BATTERY_REPORTING=y
# Enable when right half is built:
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# nice!view display
CONFIG_ZMK_DISPLAY=y

# AS5600 magnetic scroll wheel (community driver via west.yml)
CONFIG_ZMK_INPUT_AMS_AS5600=y
# Uncomment while tuning magnet gap:
# CONFIG_ZMK_INPUT_AMS_AS5600_LOG_AGC=y
